name: Build & Release Imagy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # =========================================================================
  # WINDOWS — genera .exe portable + zip
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller imagy.spec --clean --noconfirm

      - name: Package as ZIP
        run: |
          cd dist
          Compress-Archive -Path Imagy -DestinationPath Imagy_1.0.0_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagy-windows
          path: dist/Imagy_1.0.0_Windows.zip

  # =========================================================================
  # LINUX — genera .AppImage
  # =========================================================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libfuse2 \
            python3-tk tk-dev \
            libx11-dev libxft-dev libxext-dev \
            fuse squashfs-tools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller imagy.spec --clean --noconfirm

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons
          cp -r dist/Imagy/* AppDir/usr/bin/
          cp assets/icon.png AppDir/usr/share/icons/imagy.png
          cp assets/icon.png AppDir/imagy.png

          # Desktop entry
          cat > AppDir/imagy.desktop << 'EOF'
          [Desktop Entry]
          Name=Imagy
          Exec=Imagy
          Icon=imagy
          Type=Application
          Categories=Graphics;Photography;
          Comment=Image processor — compress, convert, resize and more
          EOF

          # AppRun script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Imagy" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir Imagy-1.0.0-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagy-linux
          path: Imagy-1.0.0-x86_64.AppImage

  # =========================================================================
  # MACOS — genera .dmg
  # =========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          brew install create-dmg
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller imagy.spec --clean --noconfirm

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Imagy 1.0.0" \
            --volicon "assets/icon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Imagy.app" 175 190 \
            --hide-extension "Imagy.app" \
            --app-drop-link 425 190 \
            "Imagy-1.0.0-macOS.dmg" \
            "dist/Imagy.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagy-macos
          path: Imagy-1.0.0-macOS.dmg

  # =========================================================================
  # RELEASE — publica en GitHub Releases con los 3 artefactos
  # =========================================================================
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Imagy ${{ steps.tag.outputs.TAG }}"
          draft: false
          prerelease: false
          body: |
            ## Imagy ${{ steps.tag.outputs.TAG }}

            Image processing desktop app — compress, convert, resize, remove background with AI, EXIF metadata, LQIP/Base64 and more.

            ### 📦 Downloads

            | Platform | File |
            |---|---|
            | 🪟 Windows | `Imagy_1.0.0_Windows.zip` — extract and run `Imagy.exe` |
            | 🐧 Linux | `Imagy-1.0.0-x86_64.AppImage` — `chmod +x` then run |
            | 🍎 macOS | `Imagy-1.0.0-macOS.dmg` — open and drag to Applications |

            ### ⚙️ Requirements
            - Windows 10/11 x64
            - Linux x64 (requires `libfuse2`, `libgl1`)
            - macOS 12+ (Apple Silicon & Intel)

            ---
            Built with ❤️ by [@fersot](https://github.com/fersot)
          files: |
            release-artifacts/imagy-windows/Imagy_1.0.0_Windows.zip
            release-artifacts/imagy-linux/Imagy-1.0.0-x86_64.AppImage
            release-artifacts/imagy-macos/Imagy-1.0.0-macOS.dmg
